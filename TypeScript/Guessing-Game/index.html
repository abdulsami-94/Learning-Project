<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Guessing Game</h1>
        <h2 id="header">Guess a number between 1-10</h2>
        <p id="remainingAttempts">Attempts remaining :</p>

        <div class="input-group">
            <label for="guess">Answer :</label>
            <input name="guess" type="number" id="answer" placeholder="Enter your answer" required>
        </div>

        <p id="feedback">Press the Start Button to start the Game</p>

        <div class="buttons">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset Game</button>
            <button id="submitBtn" type="submit">Submit Answer</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

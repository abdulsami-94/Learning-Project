<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Phase 3 — Logic</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0e14;
  --panel:    #0f1520;
  --card:     #141d2e;
  --border:   #1e2d45;
  --text:     #c8d8f0;
  --muted:    #4a6080;
  --dim:      #7a90a8;
  --comment:  #3a6040;

  --fn:    #38bdf8;
  --arg:   #a78bfa;
  --rec:   #34d399;

  --good:  #34d399;
  --bad:   #f87171;
  --warn:  #fbbf24;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Familjen Grotesk', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-badge {
  background: linear-gradient(135deg, var(--fn), var(--arg));
  color: #0a0e14;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.logo h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.logo-sub {
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  margin-top: 1px;
}
.hdr-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.score-display {
  text-align: right;
}
.score-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  color: var(--warn);
}
.score-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.progress-ring-wrap { position: relative; width: 44px; height: 44px; }
.progress-ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
.ring-fg { fill: none; stroke: var(--fn); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1); }
.ring-pct {
  position: absolute; top:50%; left:50%;
  transform: translate(-50%,-50%);
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: var(--fn); font-weight: 600;
}

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
aside {
  width: 220px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.topic-group { margin-bottom: 4px; }
.topic-header-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  padding: 11px 18px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.15s;
}
.topic-header-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.topic-header-btn.active { background: rgba(56,189,248,0.05); color: var(--text); }
.topic-icon { font-size: 16px; }
.topic-name-wrap { flex: 1; }
.topic-name { display: block; }
.topic-meta { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-weight: 400; }
.topic-check { font-size: 11px; }

.section-list { display: none; padding: 4px 0 4px 44px; }
.section-list.open { display: block; }
.section-btn {
  width: 100%;
  background: transparent; border: none;
  padding: 5px 10px;
  text-align: left;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex; align-items: center; gap: 7px;
  transition: color 0.15s;
  border-radius: 3px;
}
.section-btn:hover, .section-btn.active { color: var(--text); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.dot.done { background: var(--good); }
.dot.active-dot { background: var(--fn); }

/* ── MAIN ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 30px 40px 40px;
  max-width: 900px;
}

/* ── SECTION HEADER ── */
.sec-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.sec-icon-box {
  width: 48px; height: 48px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.sec-title { font-size: 24px; font-weight: 700; line-height: 1.2; }
.sec-subtitle { font-size: 13px; color: var(--dim); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
.sec-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 6px;
}

/* ── TABS ── */
.tabs { display: flex; gap: 6px; margin-bottom: 22px; }
.tab {
  padding: 5px 14px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); border-color: var(--dim); }
.tab.active { color: #0a0e14; font-weight: 600; }

/* ── CODE BLOCK ── */
.code-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 18px;
  overflow: hidden;
}
.code-bar {
  background: #0d1520;
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot-r { width:10px;height:10px;border-radius:50%;background:#f87171;opacity:.6; }
.dot-y { width:10px;height:10px;border-radius:50%;background:#fbbf24;opacity:.6; }
.dot-g { width:10px;height:10px;border-radius:50%;background:#34d399;opacity:.6; }
.code-bar-label { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-left: 6px; letter-spacing: 1px; }
.code-body { padding: 20px 22px; overflow-x: auto; }
.code-body pre {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre;
}
.c-comment { color: var(--comment); }
.c-kw   { color: #38bdf8; }
.c-fn   { color: #7dd3fc; }
.c-str  { color: #86efac; }
.c-num  { color: #fda4af; }
.c-ret  { color: #a78bfa; }

/* ── EXPLAIN ACCORDIONS ── */
.explains { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
.acc {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.acc-head {
  width: 100%;
  background: var(--card);
  border: none;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
}
.acc-head:hover { background: #16213a; }
.acc-arrow {
  font-size: 9px;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.acc-head.open .acc-arrow { transform: rotate(90deg); }
.acc-label { font-size: 12px; color: var(--dim); font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
.acc-summary { font-size: 13px; color: var(--text); }
.acc-body {
  display: none;
  padding: 16px 20px;
  background: #0d1420;
  border-top: 1px solid var(--border);
  font-size: 13.5px;
  line-height: 1.85;
  color: #a0b8d0;
}
.acc-body.open { display: block; }
.acc-body p { margin-bottom: 12px; }
.acc-body p:last-child { margin-bottom: 0; }
.acc-body code {
  background: #1a2a3a;
  padding: 1px 7px;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--warn);
}
.acc-body .mini {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 12px 16px;
  margin: 12px 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.75;
  white-space: pre-wrap;
  color: var(--text);
}
.acc-body .mini .mc { color: var(--comment); }
.acc-body strong { color: var(--text); }
.acc-body .hl  { color: var(--warn); }
.acc-body .ok  { color: var(--good); }
.acc-body .bad { color: var(--bad); }
.acc-body .inf { color: var(--fn); }

/* ── NOTE ── */
.note {
  padding: 12px 18px;
  border-radius: 7px;
  border-left: 3px solid var(--warn);
  background: #1a1505;
  font-size: 13px;
  line-height: 1.7;
  color: #d4a840;
  margin-bottom: 28px;
}
.note strong { color: var(--warn); }

/* ── QUIZ ── */
.quiz-section { margin-bottom: 10px; }
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.quiz-title {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.quiz-counter {
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted);
}

.qcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.qcard.answered-ok  { border-color: rgba(52,211,153,0.3); }
.qcard.answered-bad { border-color: rgba(248,113,113,0.2); }

.q-num {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.q-text {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.6;
  margin-bottom: 14px;
  color: var(--text);
}
.q-code {
  background: #0d1520;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  white-space: pre-wrap;
  margin-bottom: 14px;
  color: var(--text);
}
.q-options { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.opt {
  padding: 10px 16px;
  background: #0f1825;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--dim);
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  text-align: left;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.opt-letter {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
  flex-shrink: 0;
  transition: all 0.15s;
}
.opt:hover:not(:disabled) { border-color: var(--dim); color: var(--text); }
.opt:hover:not(:disabled) .opt-letter { background: var(--dim); color: #0a0e14; }
.opt:disabled { cursor: default; }
.opt.correct { border-color: var(--good); color: var(--good); background: rgba(52,211,153,0.05); }
.opt.correct .opt-letter { background: var(--good); color: #0a0e14; }
.opt.wrong   { border-color: var(--bad); color: var(--bad); background: rgba(248,113,113,0.05); }
.opt.wrong   .opt-letter { background: var(--bad); color: #0a0e14; }

.q-result {
  display: none;
  padding: 12px 16px;
  border-radius: 7px;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1.8;
}
.q-result.show { display: block; }
.q-result.ok  { background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.25); color: var(--good); }
.q-result.fail{ background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.2); color: var(--bad); }
.q-result .expl { color: var(--dim); display: block; margin-top: 5px; font-size: 11px; }
.q-result .walk { color: #5a7898; display: block; margin-top: 8px; font-size: 11px; border-top: 1px solid var(--border); padding-top: 8px; white-space: pre-wrap; }

/* ── QUIZ SCORE SUMMARY ── */
.quiz-summary {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin-top: 10px;
  text-align: center;
}
.quiz-summary.show { display: block; }
.qs-score { font-size: 36px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.qs-label { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 2px; }
.qs-msg { font-size: 14px; color: var(--dim); margin-top: 12px; line-height: 1.6; }

/* ── NAV ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  padding: 10px 22px;
  border-radius: 7px;
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-btn.prev {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.nav-btn.prev:hover:not(:disabled) { color: var(--text); border-color: var(--dim); }
.nav-btn.prev:disabled { opacity: 0.25; cursor: default; }
.nav-btn.next { border: none; color: #0a0e14; font-weight: 700; }

/* scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2a3a55; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div>
      <div class="logo-badge">PHASE 3</div>
    </div>
    <div>
      <h1>Python Logic</h1>
      <div class="logo-sub">Functions · Arguments · Recursion</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="score-display">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-label">Score</div>
    </div>
    <div class="progress-ring-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="ring-bg" cx="22" cy="22" r="18"/>
        <circle class="ring-fg" id="ringFg" cx="22" cy="22" r="18" stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
      </svg>
      <div class="ring-pct" id="ringPct">0%</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

<script>
// ════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════
const TOPICS = [
  // ══════════════════ TOPIC 1: FUNCTIONS
  {
    id:"functions", label:"Functions", emoji:"⚙️", color:"#38bdf8", tag:"def / return",
    sections:[
      {
        title:"Defining & Calling",
        subtitle:"def, return, scope",
        code:[
          ["kw","# ── Defining a function ──"],
          ["normal","def greet(name):"],
          ["normal",'    return "Hello, " + name + "!"'],
          ["blank",""],
          ["kw","# ── Calling it ──"],
          ["normal",'result = greet("Alice")'],
          ["normal",'print(result)           # → Hello, Alice!'],
          ["blank",""],
          ["kw","# ── Functions without return ──"],
          ["normal","def say_hi():"],
          ["normal",'    print("Hi!")'],
          ["normal","    # implicitly returns None"],
          ["blank",""],
          ["kw","# ── Multiple return values ──"],
          ["normal","def min_max(nums):"],
          ["normal","    return min(nums), max(nums)   # returns a tuple"],
          ["blank",""],
          ["normal","lo, hi = min_max([3, 1, 9, 4])"],
          ["normal","# lo=1, hi=9"],
          ["blank",""],
          ["kw","# ── Docstrings ──"],
          ["normal","def add(a, b):"],
          ["normal",'    """Returns the sum of a and b."""'],
          ["normal","    return a + b"],
        ],
        explains:[
          {
            label:"Why functions exist",
            summary:"Stop copy-pasting code. Write once, call everywhere.",
            body:`<p>A function is a <strong>named, reusable block of code</strong>. Instead of repeating 10 lines every time you need to do something, you write it once inside a function and call it by name.</p>
<p>Three reasons you care:</p>
<p>1. <strong>DRY</strong> (Don't Repeat Yourself) — if the logic needs to change, you change it in one place.<br>
2. <strong>Readability</strong> — <code>calculate_tax(income)</code> is clearer than 5 lines of arithmetic inline.<br>
3. <strong>Testability</strong> — you can test a function in isolation.</p>
<div class="mini"><span class="mc"># Without functions — you'd repeat this everywhere</span>
tax = income * 0.2
if income > 50000:
    tax += (income - 50000) * 0.1

<span class="mc"># With a function — write once, call anywhere</span>
def calculate_tax(income):
    tax = income * 0.2
    if income > 50000:
        tax += (income - 50000) * 0.1
    return tax

tax = calculate_tax(60000)  <span class="mc"># clean</span></div>`
          },
          {
            label:"return vs print — a crucial difference",
            summary:"print shows something on screen. return sends a value back to the caller.",
            body:`<p>This is one of the most common beginner confusions. <code>print()</code> outputs to the terminal — it doesn't give you anything to use. <code>return</code> passes a value back so you can store it, pass it elsewhere, or use it in an expression.</p>
<div class="mini"><span class="bad"># WRONG — prints but returns None</span>
def double(x):
    print(x * 2)       <span class="mc"># shows on screen but...</span>

result = double(5)     <span class="mc"># result is None!</span>
print(result + 1)      <span class="mc"># 🔥 TypeError: NoneType + int</span>

<span class="ok"># RIGHT — returns the value</span>
def double(x):
    return x * 2

result = double(5)     <span class="mc"># result is 10</span>
print(result + 1)      <span class="mc"># → 11 ✓</span></div>
<p><strong>Rule:</strong> if you want to use the output of a function elsewhere in your code, use <code>return</code>. Only use <code>print</code> inside a function if the sole purpose of that function is to display something.</p>`
          },
          {
            label:"Scope — why variables inside functions stay inside",
            summary:"Variables defined inside a function are local. They don't exist outside.",
            body:`<p>Every function has its own <strong>local scope</strong>. Variables created inside a function are destroyed when the function finishes — they're not accessible from outside.</p>
<div class="mini">x = 100   <span class="mc"># global x</span>

def change_x():
    x = 999   <span class="mc"># local x — different variable!</span>
    print(x)  <span class="mc"># → 999</span>

change_x()
print(x)      <span class="mc"># → 100  (global x unchanged)</span></div>
<p>This is actually good — it means functions can't accidentally break variables in the rest of your code. If you genuinely need to modify a global (rare), use the <code>global</code> keyword — but treat that as a last resort.</p>`
          }
        ],
        note:"Every function that doesn't have an explicit return statement implicitly returns None. Assigning the result of such a function is a very common source of bugs.",
        quizzes:[
          {
            q:"What does this function return?",
            code:"def mystery(x):\n    y = x * 2\n    print(y)",
            opts:["x * 2","y","None","0"],
            answer:2,
            expl:"No return statement → implicitly returns None. print() just outputs to screen — it doesn't return the value.",
            walk:"def mystery(x):\n    y = x * 2\n    print(y)      ← side effect only\n    # no return ← Python inserts 'return None' here\n\nResult = None"
          },
          {
            q:"What is printed?",
            code:"def add(a, b):\n    return a + b\n\nresult = add(3, 4)\nprint(result * 2)",
            opts:["7","14","Error","None"],
            answer:1,
            expl:"add(3,4) returns 7. result=7. result*2 = 14.",
            walk:"add(3, 4) → 3+4 = 7  →  result = 7\nresult * 2 = 7 * 2 = 14\nprint(14)"
          },
          {
            q:"Which correctly defines a function that returns the square of a number?",
            code:"",
            opts:["def square x: return x**2","def square(x): return x**2","function square(x): x**2","def square(x): x**2"],
            answer:1,
            expl:"def keyword, name, parentheses with params, colon, indented body with return. Option D is missing return — it would return None.",
            walk:"Correct syntax:\n  def function_name(params):\n      return expression\n\nOption A: missing parens\nOption C: wrong keyword\nOption D: missing return → returns None"
          },
          {
            q:"What is the output?",
            code:"x = 10\n\ndef foo():\n    x = 99\n    return x\n\nfoo()\nprint(x)",
            opts:["99","10","None","Error"],

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const S = {
  topicIdx: 0,
  sectionIdx: 0,
  answers: {},       // key → {selected, correct}
  openAcc: {},       // accordion open states
};

function skey(ti,si){ return `${ti}-${si}`; }

function totalQuizzes(){
  return TOPICS.reduce((a,t) => a + t.sections.reduce((b,s) => b + s.quizzes.length, 0), 0);
}
function totalAnswered(){
  return Object.keys(S.answers).length;
}
function totalCorrect(){
  return Object.values(S.answers).filter(a=>a.correct).length;
}

function updateHeader(){
  const correct = totalCorrect();
  const answered = totalAnswered();
  const total = totalQuizzes();
  const pct = Math.round(answered/total*100);
  const circ = 113.1;

  document.getElementById('scoreNum').textContent = `${correct}/${total}`;
  document.getElementById('ringFg').style.strokeDashoffset = circ - (circ * pct/100);
  document.getElementById('ringPct').textContent = pct+'%';

  // colour ring by score ratio
  const ratio = answered > 0 ? correct/answered : 0;
  const ringEl = document.getElementById('ringFg');
  ringEl.style.stroke = ratio >= 0.8 ? '#34d399' : ratio >= 0.5 ? '#fbbf24' : '#f87171';
}

// ════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════
function renderSidebar(){
  const aside = document.getElementById('sidebar');
  aside.innerHTML = '';

  TOPICS.forEach((t, ti) => {
    const group = document.createElement('div');
    group.className = 'topic-group';

    // Count answered for this topic
    let topicAnswered = 0, topicCorrect = 0;
    t.sections.forEach((s, si) => {
      s.quizzes.forEach((q, qi) => {
        const k = `${ti}-${si}-${qi}`;
        if(S.answers[k]){ topicAnswered++; if(S.answers[k].correct) topicCorrect++; }
      });
    });
    const totalQ = t.sections.reduce((a,s)=>a+s.quizzes.length, 0);
    const allDone = topicAnswered === totalQ;

    const btn = document.createElement('button');
    btn.className = 'topic-header-btn' + (ti===S.topicIdx?' active':'');
    btn.style.borderLeftColor = ti===S.topicIdx ? t.color : 'transparent';
    btn.style.color = ti===S.topicIdx ? t.color : '';
    btn.innerHTML = `
      <span class="topic-icon">${t.emoji}</span>
      <div class="topic-name-wrap">
        <span class="topic-name">${t.label}</span>
        <span class="topic-meta">${t.tag}</span>
      </div>
      <span class="topic-check">${allDone ? '✓' : `${topicAnswered}/${totalQ}`}</span>`;
    btn.addEventListener('click', () => { S.topicIdx=ti; S.sectionIdx=0; render(); });
    group.appendChild(btn);

    const secList = document.createElement('div');
    secList.className = 'section-list' + (ti===S.topicIdx?' open':'');
    t.sections.forEach((s,si) => {
      const secAnswered = s.quizzes.filter((_,qi)=>S.answers[`${ti}-${si}-${qi}`]).length;
      const secDone = secAnswered===s.quizzes.length;
      const isActive = ti===S.topicIdx && si===S.sectionIdx;
      const sb = document.createElement('button');
      sb.className = 'section-btn' + (isActive?' active':'');
      sb.innerHTML = `<span class="dot ${secDone?'done':isActive?'active-dot':''}"></span>${s.title}`;
      sb.addEventListener('click', (e)=>{ e.stopPropagation(); S.topicIdx=ti; S.sectionIdx=si; render(); });
      secList.appendChild(sb);
    });
    group.appendChild(secList);
    aside.appendChild(group);
  });
}

// ════════════════════════════════════════════════
//  CODE RENDERER
// ════════════════════════════════════════════════
function renderCode(lines){
  return lines.map(([type, text]) => {
    if(type==='blank') return '<div style="height:6px"></div>';
    const e = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(type==='kw') return `<div class="c-comment">${e}</div>`;
    // inline comment coloring
    const ci = e.search(/\s{2,}#/);
    if(ci!==-1) return `<div>${e.slice(0,ci)}<span class="c-comment">${e.slice(ci)}</span></div>`;
    return `<div>${e}</div>`;
  }).join('');
}

// ════════════════════════════════════════════════
//  RENDER ACCORDIONS
// ════════════════════════════════════════════════
function renderExplains(explains, baseKey){
  if(!explains||!explains.length) return '';
  return `<div class="explains">${explains.map((ex,ei)=>{
    const k=`${baseKey}-e${ei}`;
    const open=!!S.openAcc[k];
    return `<div class="acc">
      <button class="acc-head${open?' open':''}" data-k="${k}">
        <span class="acc-arrow">▶</span>
        <span class="acc-label">EXPLAIN</span>
        <span class="acc-summary">${ex.summary}</span>
      </button>
      <div class="acc-body${open?' open':''}" data-body="${k}">${ex.body}</div>
    </div>`;
  }).join('')}</div>`;
}

// ════════════════════════════════════════════════
//  RENDER QUIZZES
// ════════════════════════════════════════════════
function renderQuizzes(quizzes, ti, si){
  const letters = ['A','B','C','D'];
  const answered = quizzes.map((_,qi)=>S.answers[`${ti}-${si}-${qi}`]);
  const allAnswered = answered.every(Boolean);
  const correct = answered.filter(a=>a&&a.correct).length;

  let html = `<div class="quiz-section">
    <div class="quiz-header">
      <div class="quiz-title">Quick Check</div>
      <div class="quiz-counter">${answered.filter(Boolean).length} / ${quizzes.length} answered</div>
    </div>`;

  quizzes.forEach((q, qi) => {
    const k = `${ti}-${si}-${qi}`;
    const ans = S.answers[k];
    const cardCls = ans ? (ans.correct ? 'answered-ok' : 'answered-bad') : '';

    html += `<div class="qcard ${cardCls}">
      <div class="q-num">Q${qi+1} of ${quizzes.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code ? `<div class="q-code">${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
      <div class="q-options">
        ${q.opts.map((opt,oi)=>{
          let cls='opt';
          if(ans){
            if(oi===q.answer) cls+=' correct';
            else if(oi===ans.selected&&!ans.correct) cls+=' wrong';
          }
          return `<button class="${cls}" data-k="${k}" data-oi="${oi}" ${ans?'disabled':''}>
            <span class="opt-letter">${letters[oi]}</span>${opt}
          </button>`;
        }).join('')}
      </div>
      <div class="q-result${ans?' show':''}${ans?(ans.correct?' ok':' fail'):''}">
        ${ans ? `${ans.correct?'✓ Correct':'✗ Wrong'}<span class="expl">${q.expl}</span>${q.walk?`<span class="walk">${q.walk}</span>`:''}` : ''}
      </div>
    </div>`;
  });

  // Summary
  if(allAnswered){
    const msg = correct===quizzes.length
      ? "Perfect score. Either you actually understand this or you got lucky. Either way, move on."
      : correct >= quizzes.length*0.6
      ? "Decent. Review the ones you missed — the walkthrough tells you exactly why."
      : "Go back through the explanations. The answers are all in there.";
    html += `<div class="quiz-summary show">
      <div class="qs-score" style="color:${correct===quizzes.length?'#34d399':correct>=quizzes.length*0.6?'#fbbf24':'#f87171'}">${correct}/${quizzes.length}</div>
      <div class="qs-label">Section Score</div>
      <div class="qs-msg">${msg}</div>
    </div>`;
  }

  html += '</div>';
  return html;
}

// ════════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════════
function renderMain(){
  const topic = TOPICS[S.topicIdx];
  const section = topic.sections[S.sectionIdx];
  const key = skey(S.topicIdx, S.sectionIdx);
  const main = document.getElementById('main');

  // Tabs
  let tabs = '';
  if(topic.sections.length>1){
    tabs = `<div class="tabs">${topic.sections.map((s,si)=>`
      <button class="tab${si===S.sectionIdx?' active':''}" data-si="${si}"
        style="${si===S.sectionIdx?`background:${topic.color};border-color:${topic.color}`:''}">
        ${s.title}
      </button>`).join('')}</div>`;
  }

  const isFirst = S.topicIdx===0 && S.sectionIdx===0;
  const lastT = TOPICS[TOPICS.length-1];
  const isLast = S.topicIdx===TOPICS.length-1 && S.sectionIdx===lastT.sections.length-1;

  main.innerHTML = `
    ${tabs}
    <div class="sec-header">
      <div class="sec-icon-box" style="background:${topic.color}18;border:1px solid ${topic.color}30">${topic.emoji}</div>
      <div>
        <div class="sec-title" style="color:${topic.color}">${section.title}</div>
        <div class="sec-subtitle">${section.subtitle}</div>
        <span class="sec-tag" style="background:${topic.color}18;color:${topic.color}">${topic.tag}</span>
      </div>
    </div>

    <div class="code-wrap">
      <div class="code-bar">
        <div class="dot-r"></div><div class="dot-y"></div><div class="dot-g"></div>
        <span class="code-bar-label">python3</span>
      </div>
      <div class="code-body"><pre>${renderCode(section.code)}</pre></div>
    </div>

    ${renderExplains(section.explains, key)}

    <div class="note"><strong>⚠ Note: </strong>${section.note}</div>

    ${renderQuizzes(section.quizzes, S.topicIdx, S.sectionIdx)}

    <div class="nav-row">
      <button class="nav-btn prev" id="prevBtn" ${isFirst?'disabled':''}>← Previous</button>
      <button class="nav-btn next" id="nextBtn" style="background:${topic.color}">
        ${isLast?'Finish ✓':'Next →'}
      </button>
    </div>`;

  // ── Events ──
  main.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{ S.sectionIdx=+t.dataset.si; render(); });
  });

  main.querySelectorAll('.acc-head').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.k;
      S.openAcc[k]=!S.openAcc[k];
      btn.classList.toggle('open',!!S.openAcc[k]);
      main.querySelector(`.acc-body[data-body="${k}"]`).classList.toggle('open',!!S.openAcc[k]);
    });
  });

  main.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.k;
      if(S.answers[k]) return;
      const oi=+btn.dataset.oi;
      const [ti,si,qi]=k.split('-').map(Number);
      const correct=oi===TOPICS[ti].sections[si].quizzes[qi].answer;
      S.answers[k]={selected:oi,correct};
      render();
    });
  });

  document.getElementById('prevBtn').addEventListener('click',()=>{
    if(S.sectionIdx>0){ S.sectionIdx--; }
    else if(S.topicIdx>0){ S.topicIdx--; S.sectionIdx=TOPICS[S.topicIdx].sections.length-1; }
    render();
  });
  document.getElementById('nextBtn').addEventListener('click',()=>{
    const t=TOPICS[S.topicIdx];
    if(S.sectionIdx<t.sections.length-1){ S.sectionIdx++; }
    else if(S.topicIdx<TOPICS.length-1){ S.topicIdx++; S.sectionIdx=0; }
    render();
  });
}

function render(){
  renderSidebar();
  renderMain();
  updateHeader();
  document.getElementById('main').scrollTop=0;
}

render();
</script>
</body>
